<svg xmlns="http://www.w3.org/2000/svg" width="180" height="180" viewBox="0 0 180 180">
  <!-- Deep Emerald background (iOS applies its own mask; rx for reference only) -->
  <rect width="180" height="180" rx="30" fill="#0A3C36"/>
  <!-- Maqar mark: 44×50 viewBox, height=110 width=97, centred (x=42 y=35) -->
  <svg x="42" y="35" width="97" height="110" viewBox="0 0 44 50" fill="none">
    <!-- House outer left (white) -->
    <path d="M 2,48 L 2,19 L 22,2 L 34,12 L 34,19"
      stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- House right extension (gold) -->
    <path d="M 34,19 L 42,19 L 42,48"
      stroke="#E5BA73" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Meem arc (white) -->
    <path d="M 10,48 L 10,29 A 6,6 0 0,1 22,29 L 22,41"
      stroke="#FFFFFF" stroke-width="2.6" stroke-linecap="round"/>
    <!-- Key teeth (gold) -->
    <line x1="22" y1="36" x2="27" y2="36" stroke="#E5BA73" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="22" y1="41" x2="27" y2="41" stroke="#E5BA73" stroke-width="2.2" stroke-linecap="round"/>
  </svg>
</svg>
